<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Guide • parts of speech & tenses</title>
    <!-- Google Fonts & modern reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #4cc9f0;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray-100: #e9ecef;
            --gray-200: #dee2e6;
            --gray-300: #ced4da;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.15);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #2b32b2 0%, #6f4b9c 100%);
            min-height: 100vh;
            padding: 30px 20px;
            line-height: 1.7;
            color: var(--dark);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.4);
            transition: var(--transition);
        }

        /* title glow / no main‑menu extra text */
        h1 {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--secondary);
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 12px;
        }
        h2:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 25px 0 20px;
            color: var(--primary-dark);
        }

        /* --- pronoun table (modern card) --- */
        .pronoun-table {
            background: linear-gradient(145deg, #ffffff, #f5f9ff);
            border-radius: 24px;
            padding: 25px 20px;
            margin: 30px 0 20px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 12px 18px -8px rgba(67,97,238,0.2);
            border: 1px solid rgba(76,201,240,0.2);
        }

        .pronoun-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
        }

        .pronoun-header {
            font-weight: 800;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px 10px;
            border-radius: 40px;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 12px rgba(67,97,238,0.3);
        }

        .pronoun-item {
            background: var(--light);
            padding: 14px 8px;
            border-radius: 40px;
            text-align: center;
            font-weight: 500;
            color: var(--dark);
            border: 1px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: var(--transition);
        }
        .pronoun-item:hover {
            background: white;
            border-color: var(--secondary);
            transform: scale(1.02);
            box-shadow: 0 8px 14px rgba(76,201,240,0.25);
        }
        .pronoun-item strong {
            color: var(--primary-dark);
            font-weight: 700;
            display: block;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        /* buttons */
        .btn {
            display: inline-block;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px 28px;
            margin: 6px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: var(--shadow-lg);
        }
        .btn:hover:before {
            width: 300px;
            height: 300px;
        }
        .btn-main {
            background: linear-gradient(145deg, var(--accent), #b5179e);
            font-size: 1.3rem;
            padding: 16px 40px;
        }
        .btn-secondary-main {
            background: linear-gradient(145deg, #f8961e, #f3722c);
            font-size: 1.3rem;
            padding: 16px 40px;
            margin-top: 10px;
        }
        .btn-back {
            background: linear-gradient(145deg, var(--gray-200), var(--gray-100));
            color: var(--dark);
        }

        .main-menu-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 30px 0 20px;
        }
        .main-menu-buttons .btn {
            margin: 0;
            padding: 20px 8px;
            background: white;
            color: var(--dark);
            border: 2px solid transparent;
            font-weight: 600;
            box-shadow: 0 8px 12px rgba(0,0,0,0.05);
        }
        .main-menu-buttons .btn:hover {
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            border-color: white;
        }

        .tense-buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 20px;
        }
        .tense-main-btn {
            background: linear-gradient(145deg, #9c89b8, #7b6c9c);
            font-size: 1.4rem;
            padding: 20px 40px;
            min-width: 200px;
        }

        .sub-tense-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 25px 0;
        }
        .tense-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(76,201,240,0.3);
            transition: var(--transition);
        }
        .tense-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 30px -8px rgba(67,97,238,0.25);
            border-color: var(--secondary);
        }
        .tense-card h4 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 15px;
            border-bottom: 2px dashed var(--gray-300);
            padding-bottom: 8px;
        }
        .tense-card p {
            background: #f0f4fa;
            padding: 12px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 12px 0;
        }
        .tense-card .example {
            background: #fef7e6;
            border-left: 6px solid var(--warning);
            padding: 15px;
            border-radius: 20px;
            font-style: italic;
            margin-top: 15px;
        }

        #contentArea {
            min-height: 350px;
            margin-bottom: 30px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 15px 30px -12px rgba(67,97,238,0.15);
            font-size: 1.05rem;
        }
        #contentArea p { margin-bottom: 20px; color: #2d3e50; }
        #contentArea ul { padding-left: 20px; list-style: none; }
        #contentArea li { margin-bottom: 16px; padding-left: 28px; position: relative; }
        #contentArea li:before {
            content: '▹';
            color: var(--accent);
            font-size: 1.6rem;
            position: absolute;
            left: 0;
            top: -8px;
        }

        .example-box {
            background: linear-gradient(145deg, #f2f7ff, #e9f2ff);
            border-left: 8px solid var(--accent);
            padding: 24px;
            border-radius: 24px;
            margin: 30px 0 10px;
            box-shadow: 0 12px 18px -10px rgba(247,37,133,0.15);
        }
        .example-box strong:first-child { color: var(--accent); font-size: 1.2rem; }

        #navigationArea {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed var(--gray-300);
            text-align: center;
        }
        .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2.3rem; }
            .pronoun-grid { grid-template-columns: repeat(2, 1fr); }
            .sub-tense-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    const pageOrder = ['mainMenu', 'noun', 'pronoun', 'verb', 'adjective', 'adverb', 'preposition', 'conjunction', 'interjection', 'presentTense', 'pastTense', 'futureTense'];
    let currentPage = 'mainMenu';

    function showPartsOfSpeechButtons() {
        const btnContainer = document.getElementById('partsOfSpeechButtons');
        const showBtn = document.querySelector('.btn-main');
        const tensesBtnContainer = document.getElementById('tensesMainButtons');
        if (btnContainer) btnContainer.style.display = 'block';
        if (tensesBtnContainer) tensesBtnContainer.style.display = 'none';
        if (showBtn) showBtn.style.display = 'none';
        if (btnContainer) btnContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showTensesButtons() {
        const tensesContainer = document.getElementById('tensesMainButtons');
        const partsContainer = document.getElementById('partsOfSpeechButtons');
        const showBtn = document.querySelector('.btn-main');
        if (tensesContainer) tensesContainer.style.display = 'block';
        if (partsContainer) partsContainer.style.display = 'none';
        if (showBtn) showBtn.style.display = 'none';
        if (tensesContainer) tensesContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function goBackToMainMenu() {
        currentPage = 'mainMenu';
        renderPage('mainMenu');
        setTimeout(() => {
            const partsContainer = document.getElementById('partsOfSpeechButtons');
            const tensesContainer = document.getElementById('tensesMainButtons');
            const showBtn = document.querySelector('.btn-main');
            if (partsContainer) partsContainer.style.display = 'none';
            if (tensesContainer) tensesContainer.style.display = 'none';
            if (showBtn) showBtn.style.display = 'inline-block';
        }, 0);
    }

    function renderPage(pageKey) {
        const contentArea = document.getElementById('contentArea');
        const navigationArea = document.getElementById('navigationArea');
        const page = contentData[pageKey];
        if (!page) return;

        contentArea.classList.add('loading');
        setTimeout(() => {
            contentArea.innerHTML = `<h2>${page.title}</h2>${page.content}`;
            contentArea.classList.remove('loading');

            const currentIdx = pageOrder.indexOf(pageKey);
            const prevKey = currentIdx > 0 ? pageOrder[currentIdx - 1] : null;
            const nextKey = currentIdx < pageOrder.length - 1 ? pageOrder[currentIdx + 1] : null;

            let navHtml = '';
            if (pageKey !== 'mainMenu') {
                navHtml += `<button class="btn btn-back" onclick="goBackToMainMenu()">← main menu</button>`;
            }
            if (prevKey && pageKey !== 'mainMenu') {
                navHtml += `<button class="btn" onclick="navigateTo('${prevKey}')">← previous</button>`;
            }
            if (nextKey && pageKey !== 'mainMenu') {
                navHtml += `<button class="btn" onclick="navigateTo('${nextKey}')">next →</button>`;
            }
            navigationArea.innerHTML = `<div class="nav-buttons">${navHtml}</div>`;
        }, 250);
    }

    function navigateTo(pageKey) {
        currentPage = pageKey;
        renderPage(pageKey);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('DOMContentLoaded', () => navigateTo('mainMenu'));
</script>
