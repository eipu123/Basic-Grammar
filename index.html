        <div class="question-block">
            <div class="question-text">${index + 1}။ ${item.mm}</div>

    `;
});
const quizContainer = document.getElementById('quiz-container');
extraQuestions.forEach((item, index) => {
    quizContainer.innerHTML += `
        <div class="question-block">
            <div class="question-text">${item.q}</div>
            <input type="text" class="user-input" data-answer="${item.a}" placeholder="အင်္ဂလိပ်လို ရိုက်ထည့်ပါ">
            <div class="result-area"></div>
        </div>
    `;
});

function checkVocab() {
    const inputs = document.querySelectorAll('.vocab-input');
    let allFilled = true;
    let correctCount = 0;
    inputs.forEach(input => {
        if (input.value.trim() === "") {
            allFilled = false;
            input.style.borderColor = "#f39c12"; 
        }
    });

    if (!allFilled) {
        alert("ကျေးဇူးပြု၍ Vocabulary အားလုံးကို အရင်ဖြည့်ပါ။");
        return;
    }
    inputs.forEach(input => {
        const userVal = input.value.trim().toLowerCase();
        const correctVal = input.getAttribute('data-answer').toLowerCase();
        
        if (userVal === correctVal) {
            input.style.borderColor = "#27ae60";
            correctCount++;
        } else {
            input.style.borderColor = "#e74c3c";
        }
    });
    const scoreDisplay = document.getElementById('vocab-score-display');
    scoreDisplay.style.display = "block";
    document.getElementById('v-score').innerText = correctCount;
    document.getElementById('v-total').innerText = inputs.length;

    if (correctCount === inputs.length) {
        setTimeout(() => {
            alert("ဂုဏ်ယူပါတယ်!✅ အကုန်မှန်ပါတယ်။ လေ့ကျင့်ခန်း စတင်နိုင်ပါပြီ။");
            document.getElementById('vocab-section').style.display = "none";
            document.getElementById('exercise-section').style.display = "block";
            window.scrollTo(0, 0);
        }, 300);
    } else {
        alert("❌ အဖြေအချို့မှားနေပါသေးသည်။ အကုန်မှန်မှ နောက်တစ်ဆင့်သို့ သွားနိုင်မည် ဖြစ်သည်။");
    }
}

function checkAnswers() {
    const inputs = document.querySelectorAll('.user-input');
    
    let allFilled = true;
    inputs.forEach(input => {
        if (input.value.trim() === "") {
            allFilled = false;
            input.style.borderColor = "#f39c12"; 
        } else {
            input.style.borderColor = "#ddd";
        }
    });

    if (!allFilled) {
        alert("ကျေးဇူးပြု၍ အဖြေအားလုံးကို အရင်ဖြည့်စွက်ပါ။");
        return;
    }

    let correctCount = 0;
    inputs.forEach(input => {
        const userVal = input.value.trim();
        const correctVal = input.getAttribute('data-answer');
        const resultArea = input.nextElementSibling;
        resultArea.style.display = "block";
        
        const cleanUser = userVal.toLowerCase().replace(/[?.,!]/g, '').replace(/\s+/g, ' ');
        const cleanCorrect = correctVal.toLowerCase().replace(/[?.,!]/g, '').replace(/\s+/g, ' ');

        if (cleanUser === cleanCorrect) {
            resultArea.innerHTML = `<span class="status-text correct-msg">✅ မှန်ပါတယ်</span>`;
            input.style.borderColor = "#27ae60";
            correctCount++;
        } else {
            const uWords = userVal.toLowerCase().replace(/[?.,!]/g, ' $&').split(/\s+/).filter(w => w !== "");
            const cWords = correctVal.toLowerCase().replace(/[?.,!]/g, ' $&').split(/\s+/).filter(w => w !== "");
            let comparisonHTML = "";
            let maxLength = Math.max(uWords.length, cWords.length);

            for (let i = 0; i < maxLength; i++) {
                let uw = uWords[i] || "";
                let cw = cWords[i] || "";
                if (uw === cw) comparisonHTML += `<span class="word-correct">${uw}</span> `;
                else if (uw !== "" && cw === "") comparisonHTML += `<span class="word-wrong">${uw}</span> `;
                else if (uw === "" && cw !== "") comparisonHTML += `<span class="missing">(${cw})</span> `;
                else comparisonHTML += `<span class="word-wrong">${uw}</span> `;
            }
            resultArea.innerHTML = `<div><b>❌ မှား</b> ${comparisonHTML}</div><div class="ans-line"><b>အဖြေမှန်:</b> ${correctVal}</div>`;
            input.style.borderColor = "#e74c3c";
        }
    });

    document.getElementById('score-display').style.display = "block";
    document.getElementById('score-count').innerText = correctCount;
    document.getElementById('total-count').innerText = inputs.length;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
