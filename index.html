<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Grammar Guide • parts of speech & tenses</title>
    <!-- Google Fonts & modern reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #4cc9f0;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray-100: #e9ecef;
            --gray-200: #dee2e6;
            --gray-300: #ced4da;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.15);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #2b32b2 0%, #6f4b9c 100%);
            min-height: 100vh;
            width: 100%;
            margin: 0;
            padding: 0;
            line-height: 1.7;
            color: var(--dark);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            max-width: 100%;
            width: 100%;
            margin: 0;
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-radius: 0;
            box-shadow: none;
            transition: var(--transition);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--secondary);
            width: 100%;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 12px;
        }
        h2:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 20px 0 15px;
            color: var(--primary-dark);
        }

        /* --- pronoun table (modern card) --- */
        .pronoun-table {
            background: linear-gradient(145deg, #ffffff, #f5f9ff);
            border-radius: 20px;
            padding: 20px 15px;
            margin: 25px 0 15px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 8px 12px -6px rgba(67,97,238,0.2);
            border: 1px solid rgba(76,201,240,0.2);
            width: 100%;
        }

        .pronoun-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #ffffff;
            padding: 12px;
            border-radius: 18px;
            box-shadow: var(--shadow-sm);
            width: 100%;
        }

        .pronoun-header {
            font-weight: 800;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 5px;
            border-radius: 30px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 8px rgba(67,97,238,0.2);
        }

        .pronoun-item {
            background: var(--light);
            padding: 12px 4px;
            border-radius: 30px;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--dark);
            border: 1px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: var(--transition);
        }
        .pronoun-item:hover {
            background: white;
            border-color: var(--secondary);
            transform: scale(1.02);
            box-shadow: 0 8px 14px rgba(76,201,240,0.25);
        }
        .pronoun-item strong {
            color: var(--primary-dark);
            font-weight: 700;
            display: block;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        /* buttons */
        .btn {
            display: inline-block;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: var(--shadow-lg);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .btn:hover:before {
            width: 300px;
            height: 300px;
        }
        .btn-main {
            background: linear-gradient(145deg, var(--accent), #b5179e);
            font-size: 1.3rem;
            padding: 16px 30px;
            width: 100%;
            max-width: 350px;
            margin: 10px auto;
            display: block;
        }
        .btn-secondary-main {
            background: linear-gradient(145deg, #f8961e, #f3722c);
            font-size: 1.3rem;
            padding: 16px 30px;
            margin: 10px auto;
            width: 100%;
            max-width: 350px;
            display: block;
        }
        .btn-30day {
            background: linear-gradient(145deg, #06d6a0, #118ab2);
            font-size: 1.3rem;
            padding: 16px 30px;
            margin: 10px auto;
            width: 100%;
            max-width: 350px;
            display: block;
        }
        /* Verb Form Button */
        .btn-verb-forms {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            font-size: 1.3rem;
            padding: 16px 30px;
            margin: 10px auto;
            width: 100%;
            max-width: 350px;
            display: block;
            color: white;
        }
        .btn-speaking-pattern {
    background: linear-gradient(145deg, #00b4d8, #0077b6);
    font-size: 1.3rem;
    padding: 16px 30px;
    margin: 10px auto;
    width: 100%;
    max-width: 350px;
    display: block;
    color: white;
}
        .btn-back {
            background: linear-gradient(145deg, var(--gray-200), var(--gray-100));
            color: var(--dark);
        }
        .btn-day {
            background: linear-gradient(145deg, #ff9e00, #f37121);
            font-size: 0.9rem;
            padding: 12px 8px;
            min-width: 60px;
            margin: 4px;
        }

        .main-menu-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 25px 0 15px;
            width: 100%;
        }
        .main-menu-buttons .btn {
            margin: 0;
            padding: 16px 8px;
            background: white;
            color: var(--dark);
            border: 2px solid transparent;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 12px rgba(0,0,0,0.05);
            width: 100%;
        }
        .main-menu-buttons .btn:hover {
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            border-color: white;
        }

        .tense-buttons-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 25px 0 15px;
            width: 100%;
        }
        .tense-main-btn {
            background: linear-gradient(145deg, #9c89b8, #7b6c9c);
            font-size: 1.2rem;
            padding: 18px 20px;
            width: 100%;
            max-width: 280px;
        }

        .sub-tense-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 25px 0;
            width: 100%;
        }
        .tense-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(76,201,240,0.3);
            transition: var(--transition);
            width: 100%;
        }
        .tense-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -8px rgba(67,97,238,0.25);
            border-color: var(--secondary);
        }
        .tense-card h4 {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 2px dashed var(--gray-300);
            padding-bottom: 8px;
        }
        .tense-card p {
            background: #f0f4fa;
            padding: 12px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            margin: 12px 0;
        }
        .tense-card .example {
            background: #fef7e6;
            border-left: 6px solid var(--warning);
            padding: 12px;
            border-radius: 18px;
            font-style: italic;
            margin-top: 12px;
            font-size: 0.95rem;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 25px 0;
            width: 100%;
        }
        .day-grid .btn {
            margin: 0;
            padding: 12px 4px;
            background: white;
            color: var(--dark);
            border: 2px solid var(--warning);
            font-weight: 700;
            font-size: 0.85rem;
            width: 100%;
        }
        .day-grid .btn:hover {
            background: linear-gradient(145deg, var(--warning), #f8961e);
            color: white;
            border-color: white;
        }

        .vocab-list {
            list-style: none;
            padding: 0;
            width: 100%;
        }
        .vocab-list li {
            background: #f8f9fa;
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 40px;
            border-left: 6px solid var(--success);
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
        }
        .vocab-list li strong {
            color: var(--primary-dark);
            font-size: 1rem;
        }
        .vocab-list li em {
            color: var(--accent);
            font-style: normal;
            font-weight: 600;
            margin-left: 8px;
            display: inline-block;
        }

        #contentArea {
            min-height: 350px;
            margin-bottom: 25px;
            background: white;
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 10px 20px -10px rgba(67,97,238,0.15);
            font-size: 1rem;
            width: 100%;
        }
        #contentArea p { margin-bottom: 18px; color: #2d3e50; }
        #contentArea ul { padding-left: 0; list-style: none; }
        #contentArea li { margin-bottom: 14px; padding-left: 24px; position: relative; }
        #contentArea li:before {
            content: '▹';
            color: var(--accent);
            font-size: 1.4rem;
            position: absolute;
            left: 0;
            top: -6px;
        }

        .example-box {
            background: linear-gradient(145deg, #f2f7ff, #e9f2ff);
            border-left: 6px solid var(--accent);
            padding: 18px;
            border-radius: 20px;
            margin: 25px 0 10px;
            box-shadow: 0 8px 12px -8px rgba(247,37,133,0.15);
            width: 100%;
        }
        .example-box strong:first-child { color: var(--accent); font-size: 1.1rem; }

        #navigationArea {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed var(--gray-300);
            text-align: center;
            width: 100%;
        }
        .nav-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            width: 100%;
        }
        .nav-buttons .btn {
            flex: 1 1 auto;
            min-width: 120px;
        }

        /* Verb Forms Display */
        .verb-forms-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0;
            width: 100%;
        }
        .verb-form-card {
            background: white;
            border-radius: 24px;
            padding: 20px 0;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(155, 89, 182, 0.3);
            transition: var(--transition);
            width: 100%;
        }
        .verb-form-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -8px rgba(155, 89, 182, 0.25);
            border-color: #9b59b6;
        }
        .verb-form-card h3 {
            font-size: 1.5rem;
            color: #9b59b6;
            margin-bottom: 15px;
            border-bottom: 2px dashed var(--gray-300);
            padding-bottom: 8px;
            padding-left: 20px;
            padding-right: 20px;
        }
        .verb-images {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
        }
        .verb-images img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 0;
            box-shadow: var(--shadow-md);
            border: none;
            transition: var(--transition);
            display: block;
        }
        .verb-images img:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }
        .image-caption {
            font-weight: 600;
            color: #9b59b6;
            margin-top: 5px;
            text-align: center;
            padding-left: 20px;
            padding-right: 20px;
        }
        .pattern-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 25px 0;
    width: 100%;
}
.btn-pattern {
    background: linear-gradient(145deg, #00b4d8, #0096c7);
    color: white;
    font-weight: 700;
    font-size: 1rem;
    padding: 16px 8px;
    border: none;
    border-radius: 50px;
    box-shadow: var(--shadow-sm);
    transition: var(--transition);
    width: 100%;
}
.btn-pattern:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    background: linear-gradient(145deg, #0096c7, #0077b6);
}

        @media (min-width: 768px) {
            .container {
                max-width: 100%;
                width: 100%;
                margin: 0;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
                padding: 35px 40px;
            }
            body {
                padding: 0;
                align-items: flex-start;
            }
            h1 { font-size: 3rem; }
            h2 { font-size: 2.2rem; }
            .main-menu-buttons { grid-template-columns: repeat(4, 1fr); }
            .tense-buttons-container { flex-direction: row; }
            .sub-tense-grid { grid-template-columns: repeat(2, 1fr); }
            .day-grid { grid-template-columns: repeat(5, 1fr); }
            .btn-main, .btn-secondary-main, .btn-30day, .btn-verb-forms { width: auto; }
            .pattern-grid {
        grid-template-columns: repeat(5, 1fr);
    }
        }

        @media (min-width: 1200px) {
            .container {
                padding: 35px 60px;
            }
        }

        @media (max-width: 360px) {
            .pronoun-grid { grid-template-columns: repeat(2, 1fr); }
            .day-grid { grid-template-columns: repeat(2, 1fr); }
            .main-menu-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="container">

    <div id="contentArea"></div>

</div>

                    <li><strong>Subordinating Conjunctions (လက်အောက်ခံဆက်စပ်သမ္ဗန္ဓ):</strong> Connect a dependent clause to an independent clause (မှီခိုဝါကျကို အမှီခိုမဲ့ဝါကျနှင့် ဆက်စပ်သည်)။ <br><em>Examples: because, since, although, while, if</em></li>
                    <li><strong>Correlative Conjunctions (တွဲစပ်သမ္ဗန္ဓ):</strong> Work in pairs (တွဲဖက်၍ အလုပ်လုပ်သည်)။ <br><em>Examples: either...or, neither...nor, not only...but also</em></li>
                </ul>
                <div class="example-box"><strong>✨ Examples </strong><br>• I like coffee, <strong>but</strong> my brother prefers tea. (ကျွန်တော် ကော်ဖီကြိုက်ပေမယ့် ကျွန်တော့်ညီကတော့ လက်ဖက်ရည်ကို ပိုကြိုက်တယ်။)<br>• He went home <strong>because</strong> he was tired. (သူ ပင်ပန်းလို့ အိမ်ပြန်သွားတယ်။)<br>• <strong>Either</strong> you apologize <strong>or</strong> I will leave. (မင်း တောင်းပန်ရင်တောင်းပန်၊ မဟုတ်ရင် ငါထွက်သွားမယ်။)</div>
            `
        },
        interjection: {
            title: "😲 Interjection (အာမေဍိတ်)",
            content: `
                <p><strong>Definition:</strong> A word used to express emotion suddenly. It is often followed by an exclamation mark.<br><strong>အဓိပ္ပါယ်:</strong> စိတ်ခံစားမှုကို ရုတ်တရက် ဖော်ပြရန်သုံးသော စကားလုံး ဖြစ်ပြီး မကြာခဏ အာမေဍိတ်အမှတ်အသား (!) ဖြင့် အဆုံးသတ်သည်။</p>
                <p><strong>Types of Exclamation(အာမေဍိတ်အမျိုးအစားများ):</strong></p>
                <ul>
                    <li><strong>To express surprise (အံ့အားသင့်ခြင်းကို ဖော်ပြရန်):</strong> <br><em>Examples: Wow!, Oh!, Really?</em></li>
                    <li><strong>To express pain (နာကျင်မှုကို ဖော်ပြရန်):</strong> <br><em>Examples: Ouch!, Ow!</em></li>
                    <li><strong>To express joy or excitement (ဝမ်းသာခြင်း သို့မဟုတ် စိတ်လှုပ်ရှားခြင်းကို ဖော်ပြရန်):</strong> <br><em>Examples: Hooray!, Yay!, Yes!</em></li>
                    <li><strong>To express disgust (စက်ဆုပ်ခြင်းကို ဖော်ပြရန်):</strong> <br><em>Examples: Ew!, Yuck!</em></li>
                </ul>
                <div class="example-box"><strong>✨ Examples </strong><br>• <strong>Wow!</strong> That's a beautiful sunset. (ဝိုး! လှပတဲ့ နေဝင်ဆည်းဆာပဲ။)<br>• <strong>Ouch!</strong> I just stubbed my toe. (အောင်း! ကျွန်တော် ခြေချောင်းထိသွားတယ်။)<br>• <strong>Hooray!</strong> We won the match. (ဟူးရေး! ငါတို့ ပွဲနိုင်သွားပြီ။)<br><br>• <strong>လေ့ကျင့်ခန်း:</strong> "Wow! The smart developer quickly wrote a code and he was happy."<br> → <strong>Wow!</strong> (interjection), <strong>smart</strong> (adj), <strong>developer</strong> (noun), <strong>quickly</strong> (adv), <strong>wrote</strong> (verb), <strong>code</strong> (noun), <strong>and</strong> (conj), <strong>he</strong> (pron), <strong>was</strong> (verb).</div>
            `
        }
    };

    function showVerbForms() {
        const contentArea = document.getElementById('contentArea');

    function goBackToMainMenu() {
    currentPage = 'mainMenu';
    renderPage('mainMenu');
    
    setTimeout(() => {
        // Show all main buttons
        const showBtn = document.querySelector('.btn-main');
        const showBtn2 = document.querySelector('.btn-secondary-main');
        const showBtn3 = document.querySelector('.btn-30day');
        const showBtn4 = document.querySelector('.btn-verb-forms');
        const showBtn5 = document.querySelector('.btn-speaking-pattern');

        if (showBtn2) showBtn2.style.display = 'inline-block';
        if (showBtn3) showBtn3.style.display = 'inline-block';
        if (showBtn4) showBtn4.style.display = 'inline-block';
        if (showBtn5) showBtn5.style.display = 'inline-block';
        
        // Hide all button groups
        const partsContainer = document.getElementById('partsOfSpeechButtons');
        const tensesContainer = document.getElementById('tensesMainButtons');
        const day30Container = document.getElementById('day30MainButtons');
        const patternContainer = document.getElementById('speakingPatternMainButtons');

        if (day30Container) day30Container.style.display = 'none';
        if (patternContainer) patternContainer.style.display = 'none';
    }, 0);
}

    function renderPage(pageKey) {
        const contentArea = document.getElementById('contentArea');
        const navigationArea = document.getElementById('navigationArea');
        const page = contentData[pageKey];
        if (!page) return;

        contentArea.classList.add('loading');
        setTimeout(() => {
            contentArea.innerHTML = `<h2>${page.title}</h2>${page.content}`;
            contentArea.classList.remove('loading');

            const currentIdx = pageOrder.indexOf(pageKey);
            const prevKey = currentIdx > 0 ? pageOrder[currentIdx - 1] : null;
            const nextKey = currentIdx < pageOrder.length - 1 ? pageOrder[currentIdx + 1] : null;

            let navHtml = '';
            if (pageKey !== 'mainMenu') {
                navHtml += `<button class="btn btn-back" onclick="goBackToMainMenu()">← main menu</button>`;
            }
            if (prevKey && pageKey !== 'mainMenu') {
                navHtml += `<button class="btn" onclick="navigateTo('${prevKey}')">← previous</button>`;
            }
            if (nextKey && pageKey !== 'mainMenu') {
                navHtml += `<button class="btn" onclick="navigateTo('${nextKey}')">next →</button>`;
            }
            navigationArea.innerHTML = `<div class="nav-buttons">${navHtml}</div>`;
        }, 250);
    }

    function navigateTo(pageKey) {
    currentPage = pageKey;
    renderPage(pageKey);
    
    // Hide all button groups
    const partsContainer = document.getElementById('partsOfSpeechButtons');
    const tensesContainer = document.getElementById('tensesMainButtons');
    const day30Container = document.getElementById('day30MainButtons');
    const patternContainer = document.getElementById('speakingPatternMainButtons');
    const showBtn = document.querySelector('.btn-main');
    const showBtn2 = document.querySelector('.btn-secondary-main');
    const showBtn3 = document.querySelector('.btn-30day');
    const showBtn4 = document.querySelector('.btn-verb-forms');
    const showBtn5 = document.querySelector('.btn-speaking-pattern');
    
    if (partsContainer) partsContainer.style.display = 'none';
    if (tensesContainer) tensesContainer.style.display = 'none';
    if (day30Container) day30Container.style.display = 'none';
    if (patternContainer) patternContainer.style.display = 'none';
    
    // Hide main buttons
    if (showBtn) showBtn.style.display = 'none';
    if (showBtn2) showBtn2.style.display = 'none';
    if (showBtn3) showBtn3.style.display = 'none';
    if (showBtn4) showBtn4.style.display = 'none';
    if (showBtn5) showBtn5.style.display = 'none';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
    document.addEventListener('DOMContentLoaded', () => navigateTo('mainMenu'));
